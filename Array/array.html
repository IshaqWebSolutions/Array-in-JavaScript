<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Array</title>
</head>
<body>
  <h1 style="text-align: center;">Array In JavaScript</h1>
  
  <script>
    //Array and typeOf Array
    let numbers = [1,2,3,4,5,6];
    console.log(numbers);
    console.log(numbers[4]);
    console.log(typeof numbers);
    console.log(Array.isArray(numbers));
    console.log(typeof numbers);

    //Array.isArray checks typeOf array
    let obj = {
      name: 'Muhammad Ishaq',
      age: 19,
    }
    console.log(obj);
    console.log(typeof obj);
    console.log(Array.isArray(obj));
    console.log("Name: ",obj.name);

    
    //We can store any type of data inside an array
    let arr = [1,true,null,'IShaq',{rollNo: 19}];
    console.log(arr[2]);
    console.log(arr[4]);
    console.log(typeof arr[4]);
    console.log(Array.isArray(arr[4]));

    //length property
    let array = [1,2,3,7,8];
    console.log(array);
    console.log(array.length);

    //push and pop add or remove element to end 
    array.push(6);
    console.log(array);
    array.pop();
    console.log(array);

    //shift and unShift add or remove to begining
    array.shift(8);
    console.log(array);
    array.unshift();
    console.log(array);

    //splice 
    array.splice(1,2);
    console.log(array);

    //To String and sort
    let str = [1,4,3,6,5];
    console.log(str.toString()); 
    console.log(str.sort());
    console.log(str);

    //ValueOF get array itself
    let val = [1,2,3,4];
    console.log(val);
    val.valueOf();
    console.log(val);

    //array get reference
    let arr1 = [1,2,3,45,6];
    console.log(arr1);
    arr2 = arr1;
    arr2[0] = 99;
    console.log(arr1);

    //De structuring in array
    let [a,b,c,d,e] = arr1;
    console.log(a + " " + b + " " + c + " " + d + " " + e + " ");
  </script>
</body>
</html>
